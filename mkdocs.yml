site_name: code-review-agent
site_description: AI-powered code review agent integrated with Azure DevOps
site_author: gaozhidf

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

repo_url: https://github.com/gaozhidf/code-review-agent
edit_uri: edit/main/docs/

plugins:
  - search
  - mermaid2

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Team Standards: team-standards.md
  - Development: development.md
